# AeroSpace Tiling Window Manager Configuration
# This config should be symlinked to ~/.aerospace.toml
# Documentation: https://nikitabobko.github.io/AeroSpace/guide

# Commands that run after login to macOS user session
# 'start-at-login' needs to be 'true' for 'after-login-command' to work
after-login-command = []

# Commands that run after AeroSpace startup
after-startup-command = [
    # Kill any existing borders process to prevent duplicates
    'exec-and-forget pkill -x borders',

    # JankyBorders with optimized settings for multi-monitor setup
    # - Thinner borders (2.0) for cleaner look across 3 monitors
    # - Bright green active border for better visibility
    # - Transparent inactive borders to reduce visual clutter
    # - Round style for modern appearance
    'exec-and-forget borders active_color=0xff00ff00 inactive_color=0x00000000 width=2.0 style=round hidpi=on',

    # Optional: Sketchybar for workspace indicators (uncomment if needed)
    # 'exec-and-forget sketchybar',
]

# Workspace change callbacks
# 1. Set horizontal layout for Dell portrait monitor workspaces (M, E, V, 9)
# 2. Notify Sketchybar about workspace change (optional)
exec-on-workspace-change = ['/bin/bash', '-c', '''
    # Auto-set horizontal layout for Dell portrait monitor workspaces
    case "$AEROSPACE_FOCUSED_WORKSPACE" in
        M|E|V|9)
            aerospace layout v_tiles
            ;;
    esac
    # Uncomment to notify Sketchybar
    # sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE
''']

# Start AeroSpace at login
start-at-login = true

# Normalizations. See: https://nikitabobko.github.io/AeroSpace/guide#normalization
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# See: https://nikitabobko.github.io/AeroSpace/guide#layouts
# The 'accordion-padding' specifies the size of accordion padding
# You can set 0 to disable the padding feature
accordion-padding = 30

# Possible values: tiles|accordion
default-root-container-layout = 'tiles'

# Possible values: horizontal|vertical|auto
# 'auto' means: wide monitor (anything wider than high) gets horizontal orientation,
#               tall monitor (anything higher than wide) gets vertical orientation
default-root-container-orientation = 'auto'

# Possible values: (qwerty|dvorak)
# See https://nikitabobko.github.io/AeroSpace/guide#key-mapping
key-mapping.preset = 'qwerty'

# Mouse follows focus when focused window/monitor changes
# This helps with multi-monitor setups and keyboard-driven workflows
# See https://nikitabobko.github.io/AeroSpace/guide#on-focus-changed-callbacks
on-focus-changed = "move-mouse window-lazy-center"
on-focused-monitor-changed = ['move-mouse monitor-lazy-center']

# Pin key workspaces to specific monitors (root-level)
# See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
#
# Monitor Layout:
# 1. DELL U2718Q (4K Portrait 270°) - Communication & Media (horizontal tiling preferred)
# 2. LC49G95T (2) (Ultrawide) - Secondary workspace for browser/research
# 3. LC49G95T (1) (Ultrawide Main) - Primary development and terminal
[workspace-to-monitor-force-assignment]
# Dell U2718Q (Portrait) - Communication & Media hub
M = 'DELL U2718Q'  # Messaging (Slack/Discord/Spark)
E = 'DELL U2718Q'  # Email
V = 'DELL U2718Q'  # Video/Streaming
9 = 'DELL U2718Q'  # Media/Music

# LC49G95T (1) - Primary development (Main monitor)
1 = 'LC49G95T (1)'  # Primary coding
2 = 'LC49G95T (1)'  # Secondary coding
T = 'LC49G95T (1)'  # Terminal
F = 'LC49G95T (1)'  # Finder (keep on main)

# LC49G95T (2) - Research & Documentation
B = 'LC49G95T (2)'  # Browser
3 = 'LC49G95T (2)'  # Testing/debugging
4 = 'LC49G95T (2)'  # Documentation
N = 'LC49G95T (2)'  # Notes (Obsidian/Notion)

# Gaps between windows (inner-*) and between monitor edges (outer-*).
# Possible values:
# - Constant:     gaps.outer.top = 8
# - Per monitor:  gaps.outer.top = [{ monitor.main = 16 }, { monitor."some-pattern" = 32 }, 24]
#                 In this example, 24 is a default value when there is no match.
#                 Monitor pattern is the same as for 'workspace-to-monitor-force-assignment'.
#                 See: https://nikitabobko.github.io/AeroSpace/guide#assign-workspaces-to-monitors
[gaps]
inner.horizontal = 15
inner.vertical =   15
outer.left =       30
outer.bottom =     30
# outer.top =        40
outer.right =      30
# Per-monitor top gaps for current setup
# Adjust values if you prefer more/less headroom under the menu bar
outer.top = [
    { monitor."LC49G95T (1)" = 30 },
    { monitor."LC49G95T (2)" = 30 },
    { monitor."DELL U2718Q" = 10 },
    40
]




# 'main' binding mode declaration
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
# 'main' binding mode must be always presented
[mode.main.binding]

# All possible keys:
# - Letters.        a, b, c, ..., z
# - Numbers.        0, 1, 2, ..., 9
# - Keypad numbers. keypad0, keypad1, keypad2, ..., keypad9
# - F-keys.         f1, f2, ..., f20
# - Special keys.   minus, equal, period, comma, slash, backslash, quote, semicolon, backtick,
#                   leftSquareBracket, rightSquareBracket, space, enter, esc, backspace, tab
# - Keypad special. keypadClear, keypadDecimalMark, keypadDivide, keypadEnter, keypadEqual,
#                   keypadMinus, keypadMultiply, keypadPlus
# - Arrows.         left, down, up, right

# All possible modifiers: cmd, alt, ctrl, shift

# All possible commands: https://nikitabobko.github.io/AeroSpace/commands

# Quick terminal launch (using Ghostty as default)
# Change to your preferred terminal: wezterm, alacritty, or Terminal.app
alt-enter = 'exec-and-forget open -n /Applications/Ghostty.app'

# Window management
alt-shift-c = 'close'
alt-shift-space = 'fullscreen'
alt-r = 'reload-config'

# Layout management
alt-slash = 'layout tiles horizontal vertical'
alt-comma = 'layout accordion horizontal vertical'
alt-period = 'layout floating tiling'

# See: https://nikitabobko.github.io/AeroSpace/commands#focus
alt-h = 'focus left'
alt-j = 'focus down'
alt-k = 'focus up'
alt-l = 'focus right'

# See: https://nikitabobko.github.io/AeroSpace/commands#move
alt-shift-h = 'move left'
alt-shift-j = 'move down'
alt-shift-k = 'move up'
alt-shift-l = 'move right'


# Workspace navigation
# Numbers 1-4 for coding/development
alt-1 = 'workspace 1' # Primary coding
alt-2 = 'workspace 2' # Secondary coding
alt-3 = 'workspace 3' # Testing/debugging
alt-4 = 'workspace 4' # Documentation
alt-5 = 'workspace 5' # Research
alt-6 = 'workspace 6' # Containers/VMs
alt-7 = 'workspace 7' # Monitoring
alt-8 = 'workspace 8' # Misc
alt-9 = 'workspace 9' # Media/Music

# Named workspaces for specific apps
alt-b = 'workspace B' # Browser
alt-e = 'workspace E' # Email
alt-f = 'workspace F' # Finder
alt-m = 'workspace M' # Messaging (Slack/Discord)
alt-n = 'workspace N' # Notes (Obsidian/Notion)
alt-t = 'workspace T' # Terminal
alt-v = 'workspace V' # Video/Streaming

# Show all workspaces
alt-0 = 'workspace-back-and-forth'

# Move window to workspace
alt-shift-1 = 'move-node-to-workspace 1'
alt-shift-2 = 'move-node-to-workspace 2'
alt-shift-3 = 'move-node-to-workspace 3'
alt-shift-4 = 'move-node-to-workspace 4'
alt-shift-5 = 'move-node-to-workspace 5'
alt-shift-6 = 'move-node-to-workspace 6'
alt-shift-7 = 'move-node-to-workspace 7'
alt-shift-8 = 'move-node-to-workspace 8'
alt-shift-9 = 'move-node-to-workspace 9'

# Move to named workspaces
alt-shift-b = 'move-node-to-workspace B'
alt-shift-e = 'move-node-to-workspace E'
alt-shift-f = 'move-node-to-workspace F'
alt-shift-m = 'move-node-to-workspace M'
alt-shift-n = 'move-node-to-workspace N'
alt-shift-t = 'move-node-to-workspace T'
alt-shift-v = 'move-node-to-workspace V'


# See: https://nikitabobko.github.io/AeroSpace/commands#workspace-back-and-forth
alt-tab = 'workspace-back-and-forth'
# See: https://nikitabobko.github.io/AeroSpace/commands#move-workspace-to-monitor
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# See: https://nikitabobko.github.io/AeroSpace/commands#mode
alt-shift-semicolon = 'mode service'

alt-shift-r = 'mode resize'

[mode.resize.binding]
h = 'resize width -50'
j = 'resize height +50'
k = 'resize height -50'
l = 'resize width +50'
b = 'balance-sizes'


# See: https://nikitabobko.github.io/AeroSpace/commands#resize
alt-shift-minus = 'resize smart -50'
alt-shift-equal = 'resize smart +50'

enter = 'mode main'
esc = 'mode main'

# 'service' binding mode declaration.
# See: https://nikitabobko.github.io/AeroSpace/guide#binding-modes
[mode.service.binding]
esc = ['reload-config', 'mode main']
r = ['flatten-workspace-tree', 'mode main'] # reset layout
#s = ['layout sticky tiling', 'mode main'] # sticky is not yet supported https://github.com/nikitabobko/AeroSpace/issues/2
f = ['layout floating tiling', 'mode main'] # Toggle between floating and tiling layout
backspace = ['close-all-windows-but-current', 'mode main']

alt-shift-h = ['join-with left', 'mode main']
alt-shift-j = ['join-with down', 'mode main']
alt-shift-k = ['join-with up', 'mode main']
alt-shift-l = ['join-with right', 'mode main']

# App-specific window rules and workspace assignments

# Development Tools
[[on-window-detected]]
if.app-id = 'com.todesktop.230313mzl4w4u92'  # Cursor
run = "move-node-to-workspace 1"

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = "move-node-to-workspace 1"

[[on-window-detected]]
if.app-id = 'com.github.wez.wezterm'
run = "move-node-to-workspace T"

[[on-window-detected]]
if.app-id = 'io.alacritty'
run = "move-node-to-workspace T"

[[on-window-detected]]
if.app-id = 'com.mitchellh.ghostty'
run = "move-node-to-workspace T"

# Browsers
[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = "move-node-to-workspace B"

[[on-window-detected]]
if.app-id = 'org.mozilla.firefox'
run = "move-node-to-workspace B"

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
run = "move-node-to-workspace B"

[[on-window-detected]]
if.app-id = 'app.zen-browser.zen'
run = "move-node-to-workspace B"

# Communication
[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = "move-node-to-workspace M"

[[on-window-detected]]
# Catch Discord across stable/PTB/Canary by name (bundle IDs vary)
if.app-name-regex-substring = 'discord'
run = "move-node-to-workspace M"

[[on-window-detected]]
if.app-id = 'com.hnc.Discord'
run = "move-node-to-workspace M"

[[on-window-detected]]
if.app-id = 'com.apple.mail'
run = "move-node-to-workspace E"

# Spark mail (route to M). Use name-based rule to avoid bundle-id ambiguity.
[[on-window-detected]]
if.app-name-regex-substring = 'Spark'
run = "move-node-to-workspace M"

# Notes & Documentation
[[on-window-detected]]
if.app-id = 'notion.id'
run = "move-node-to-workspace N"

[[on-window-detected]]
if.app-id = 'md.obsidian'
run = "move-node-to-workspace N"

# Media
[[on-window-detected]]
if.app-id = 'com.spotify.client'
run = "move-node-to-workspace M"

[[on-window-detected]]
if.app-id = 'com.apple.Music'
run = "move-node-to-workspace M"

# System Apps - Float by default
# Note: Can't combine move-node-to-workspace with layout commands yet
# See: https://github.com/nikitabobko/AeroSpace/issues/20
# Workaround: Manually float Finder with alt+. when needed
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = "move-node-to-workspace F"

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.System-Preferences'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Calculator'
run = 'layout floating'

[[on-window-detected]]
if.app-name-regex-substring = 'Shottr'
run = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.Preview'
run = 'layout floating'
