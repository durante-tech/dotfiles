# Alacritty Configuration - Rose Pine Theme (matching Ghostty)
# Note: Alacritty doesn't support background blur or chord keybindings
# Use tmux for splits (already configured in your dotfiles)

[general]
live_config_reload = true

[window]
decorations = "Buttonless"
startup_mode = "Windowed"
opacity = 0.75
blur = true
padding = { x = 10, y = 10 }
dynamic_padding = false
option_as_alt = "Both"

[font]
size = 18.0

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[font.bold_italic]
family = "JetBrainsMono Nerd Font"
style = "Bold Italic"

[cursor]
style = { shape = "Block", blinking = "Never" }
unfocused_hollow = true

[mouse]
hide_when_typing = true

[selection]
save_to_clipboard = true

# Rose Pine Theme
[colors.primary]
background = "#000000"
foreground = "#e0def4"

[colors.cursor]
cursor = "#ffff00"
text = "#000000"

[colors.selection]
background = "#2a2837"
text = "#e0def4"

[colors.normal]
black = "#26233a"
red = "#eb6f92"
green = "#9ccfd8"
yellow = "#f6c177"
blue = "#31748f"
magenta = "#c4a7e7"
cyan = "#ebbcba"
white = "#e0def4"

[colors.bright]
black = "#6e6a86"
red = "#eb6f92"
green = "#9ccfd8"
yellow = "#f6c177"
blue = "#31748f"
magenta = "#c4a7e7"
cyan = "#ebbcba"
white = "#e0def4"

[keyboard]
bindings = [
    # Reload config
    { key = "R", mods = "Command|Shift", action = "ResetFontSize" },

    # New window
    { key = "N", mods = "Command", action = "SpawnNewInstance" },

    # Vi mode
    { key = "Space", mods = "Control|Shift", action = "ToggleViMode" },
]
