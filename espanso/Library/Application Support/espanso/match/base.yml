# espanso base match file — minimal starter snippets
# Add more triggers here. Reference: https://espanso.org/docs/matches/basics/

matches:
  # ISO date stamp — :dt -> 2026-04-30
  - trigger: ":dt"
    replace: "{{date}}"
    vars:
      - name: date
        type: date
        params:
          format: "%Y-%m-%d"

  # ISO timestamp — :ts -> 2026-04-30T14:32:01
  - trigger: ":ts"
    replace: "{{ts}}"
    vars:
      - name: ts
        type: date
        params:
          format: "%Y-%m-%dT%H:%M:%S"

  # Email signature — :sig. Name/email come from ~/.config/dotfiles/personal.env
  # (DOTFILES_SIG_NAME / DOTFILES_SIG_EMAIL), falling back to git config.
  # Absolute git path because espanso's shell context has minimal $PATH.
  - trigger: ":sig"
    replace: |
      {{sig_name}}
      {{sig_email}}
    vars:
      - name: sig_name
        type: shell
        params:
          cmd: '. "$HOME/.config/dotfiles/personal.env" 2>/dev/null; printf "%s" "${DOTFILES_SIG_NAME:-$(/usr/bin/git config --get user.name 2>/dev/null)}"'
      - name: sig_email
        type: shell
        params:
          cmd: '. "$HOME/.config/dotfiles/personal.env" 2>/dev/null; printf "%s" "${DOTFILES_SIG_EMAIL:-$(/usr/bin/git config --get user.email 2>/dev/null)}"'

  # ─── Local LLM via Ollama (qwen3-coder:30b) ──────────────────────────────
  # Requires: `ollama-up` running + qwen3-coder:30b pulled.
  # Absolute paths used because espanso's shell context has minimal $PATH.

  # :llm — pipes clipboard to qwen3-coder, reply replaces the trigger
  # Workflow: copy any text → type ":llm" → wait → reply appears inline
  - trigger: ":llm"
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "/usr/bin/pbpaste | /opt/homebrew/bin/ollama run qwen3-coder:30b 2>/dev/null"

  # :llmf — form popup, type prompt directly (no clipboard needed)
  - trigger: ":llmf"
    form: |
      Prompt:
      [[prompt]]
    form_fields:
      prompt:
        multiline: true
    replace: "{{output}}"
    vars:
      - name: output
        type: shell
        params:
          cmd: "/opt/homebrew/bin/ollama run qwen3-coder:30b '{{form1.prompt}}' 2>/dev/null"
