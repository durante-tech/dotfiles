# Kitty Terminal Configuration
# Mirrored from Ghostty config
# Reload config: ctrl+shift+f5 (or ctrl+b>r via custom mapping below)

# =============================================================================
# THEME
# =============================================================================

include rosepine.conf

# =============================================================================
# BACKGROUND & TRANSPARENCY
# =============================================================================

background #000000
background_opacity 0.75
background_blur 23

# =============================================================================
# FONT
# =============================================================================

font_family JetBrainsMono Nerd Font
font_size 14.0

# Thicken text (macOS text rendering)
text_composition_strategy 1.0 0

# Adjust character spacing (-5% like Ghostty)
modify_font cell_width 95%

# Enable programming ligatures
disable_ligatures never

# =============================================================================
# CURSOR
# =============================================================================

cursor_shape block
cursor_blink_interval 0
cursor #ffff00
cursor_text_color background

# =============================================================================
# WINDOW & APPEARANCE
# =============================================================================

# Hidden titlebar (like Ghostty macos-titlebar-style = hidden)
hide_window_decorations titlebar-only

window_padding_width 10

# No confirm on close
confirm_os_window_close 0

# =============================================================================
# MACOS SPECIFIC
# =============================================================================

# Option as Alt (like Ghostty macos-option-as-alt = true)
macos_option_as_alt yes

# Hide mouse while typing
mouse_hide_wait 0

# No window shadow (helps with tiling WMs)
macos_show_window_title_in none

# Shell integration (match Ghostty: no-cursor)
shell_integration no-cursor

# =============================================================================
# MISC
# =============================================================================

# Disable audio bell
enable_audio_bell no

# =============================================================================
# KEYBINDINGS — Ctrl+B prefix mode (replaces tmux)
# =============================================================================

# Clear default shortcuts that conflict
map cmd+t no_op
map cmd+n no_op
map cmd+w no_op

# Shift+Enter passthrough (like Ghostty)
map shift+enter send_text all \x1b\x0d

# Inspector toggle
map cmd+i show_kitty_env_vars

# --- Prefix mode: Ctrl+B enters "tmux" mode ---
# NOTE: You lose readline Ctrl+B (backward-char). Use left arrow instead.
map --new-mode tmux ctrl+b

# Escape / Ctrl+C exits prefix mode
map --mode tmux escape pop_keyboard_mode
map --mode tmux ctrl+c pop_keyboard_mode

# ── Core ─────────────────────────────────────────────────────
# Reload config (prefix + r)
map --mode tmux r load_config_file
map --mode tmux r pop_keyboard_mode

# Close pane (prefix + x)
map --mode tmux x close_window
map --mode tmux x pop_keyboard_mode

# New tab (prefix + c) — equivalent to tmux new-window
map --mode tmux c new_tab_with_cwd
map --mode tmux c pop_keyboard_mode

# New OS window (prefix + n) — closest to tmux new-session
map --mode tmux n new_os_window
map --mode tmux n pop_keyboard_mode

# Detach — no real equivalent, but close the OS window
map --mode tmux shift+d close_os_window
map --mode tmux shift+d pop_keyboard_mode

# ── Tab navigation (prefix + 1-9) ───────────────────────────
map --mode tmux 1 goto_tab 1
map --mode tmux 1 pop_keyboard_mode
map --mode tmux 2 goto_tab 2
map --mode tmux 2 pop_keyboard_mode
map --mode tmux 3 goto_tab 3
map --mode tmux 3 pop_keyboard_mode
map --mode tmux 4 goto_tab 4
map --mode tmux 4 pop_keyboard_mode
map --mode tmux 5 goto_tab 5
map --mode tmux 5 pop_keyboard_mode
map --mode tmux 6 goto_tab 6
map --mode tmux 6 pop_keyboard_mode
map --mode tmux 7 goto_tab 7
map --mode tmux 7 pop_keyboard_mode
map --mode tmux 8 goto_tab 8
map --mode tmux 8 pop_keyboard_mode
map --mode tmux 9 goto_tab 9
map --mode tmux 9 pop_keyboard_mode

# ── Splits ───────────────────────────────────────────────────
# prefix + | — vertical split (like tmux split -h)
map --mode tmux | launch --location=vsplit --cwd=current
map --mode tmux | pop_keyboard_mode

# prefix + - — horizontal split (like tmux split -v)
map --mode tmux - launch --location=hsplit --cwd=current
map --mode tmux - pop_keyboard_mode

# ── Pane navigation (prefix + h/j/k/l) ──────────────────────
map --mode tmux h neighboring_window left
map --mode tmux h pop_keyboard_mode
map --mode tmux j neighboring_window bottom
map --mode tmux j pop_keyboard_mode
map --mode tmux k neighboring_window top
map --mode tmux k pop_keyboard_mode
map --mode tmux l neighboring_window right
map --mode tmux l pop_keyboard_mode

# ── Pane resize (prefix + H/J/K/L) ──────────────────────────
map --mode tmux shift+j resize_window shorter 3
map --mode tmux shift+j pop_keyboard_mode
map --mode tmux shift+k resize_window taller 3
map --mode tmux shift+k pop_keyboard_mode
map --mode tmux shift+l resize_window wider 3
map --mode tmux shift+l pop_keyboard_mode
map --mode tmux shift+h resize_window narrower 3
map --mode tmux shift+h pop_keyboard_mode

# ── Zoom / maximize pane (prefix + m) ───────────────────────
map --mode tmux m toggle_layout stack
map --mode tmux m pop_keyboard_mode

# ── Equalize layout (prefix + e) ────────────────────────────
map --mode tmux e goto_layout grid
map --mode tmux e pop_keyboard_mode

# ── Copy mode (prefix + v) — scrollback in pager ────────────
map --mode tmux v show_scrollback
map --mode tmux v pop_keyboard_mode

# ── Clear pane (prefix + Ctrl+K) ────────────────────────────
map --mode tmux ctrl+k clear_terminal scrollback active
map --mode tmux ctrl+k pop_keyboard_mode

# ── Floating overlays ───────────────────────────────────────
# prefix + Ctrl+Y — yazi file manager
map --mode tmux ctrl+y launch --type=overlay --cwd=current yazi
map --mode tmux ctrl+y pop_keyboard_mode

# prefix + Ctrl+T — quick floating terminal
map --mode tmux ctrl+t launch --type=overlay --cwd=current
map --mode tmux ctrl+t pop_keyboard_mode

# prefix + Ctrl+G — lazygit
map --mode tmux ctrl+g launch --type=overlay --cwd=current lazygit
map --mode tmux ctrl+g pop_keyboard_mode

# prefix + Ctrl+M — rmpc music player
map --mode tmux ctrl+m launch --type=overlay rmpc
map --mode tmux ctrl+m pop_keyboard_mode

# prefix + Ctrl+W — w3m browser
map --mode tmux ctrl+w launch --type=overlay w3m https://duckduckgo.com
map --mode tmux ctrl+w pop_keyboard_mode

# ── Sessionizer (prefix + f) — fzf project picker ───────────
map --mode tmux f launch --type=overlay --cwd=current kitty-sessionizer
map --mode tmux f pop_keyboard_mode

# ── Config menu (prefix + d) — fzf config picker ────────────
map --mode tmux d launch --type=overlay kitty-config-menu
map --mode tmux d pop_keyboard_mode

# ── Layout presets (prefix + Alt+1..5) ───────────────────────
map --mode tmux alt+1 goto_layout splits
map --mode tmux alt+1 pop_keyboard_mode
map --mode tmux alt+2 goto_layout horizontal
map --mode tmux alt+2 pop_keyboard_mode
map --mode tmux alt+3 goto_layout grid
map --mode tmux alt+3 pop_keyboard_mode
map --mode tmux alt+4 goto_layout vertical
map --mode tmux alt+4 pop_keyboard_mode
map --mode tmux alt+5 goto_layout stack
map --mode tmux alt+5 pop_keyboard_mode

# Enable layouts needed for splits and zoom
enabled_layouts splits,grid,stack,horizontal,vertical

# =============================================================================
# SCROLLBACK PAGER (nvim for vim-style copy mode)
# =============================================================================

scrollback_pager nvim -c "set nonumber norelativenumber signcolumn=no showtabline=0 foldcolumn=0 laststatus=0" -c "autocmd TermOpen * normal G" -c "silent! %s/\\e\\[[0-9;]*m//g" -c "map q :qa!<CR>" -

# =============================================================================
# IMAGE SUPPORT
# =============================================================================

placement_strategy top-left
