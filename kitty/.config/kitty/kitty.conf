# Kitty Terminal Configuration
# Mirrored from Ghostty config
# Reload config: ctrl+shift+f5 (or cmd+b>r via custom mapping below)

# =============================================================================
# THEME
# =============================================================================

include rosepine.conf

# =============================================================================
# BACKGROUND & TRANSPARENCY
# =============================================================================

background #000000
background_opacity 0.75
background_blur 23

# =============================================================================
# FONT
# =============================================================================

font_family JetBrainsMono Nerd Font
font_size 14.0

# Thicken text (macOS text rendering)
text_composition_strategy 1.0 0

# Adjust character spacing (-5% like Ghostty)
modify_font cell_width 95%

# Enable programming ligatures
disable_ligatures never

# =============================================================================
# CURSOR
# =============================================================================

cursor_shape block
cursor_blink_interval 0
cursor #ffff00
cursor_text_color background

# =============================================================================
# WINDOW & APPEARANCE
# =============================================================================

# Hidden titlebar (like Ghostty macos-titlebar-style = hidden)
hide_window_decorations titlebar-only

window_padding_width 10

# No confirm on close
confirm_os_window_close 0

# =============================================================================
# MACOS SPECIFIC
# =============================================================================

# Option as Alt (like Ghostty macos-option-as-alt = true)
macos_option_as_alt yes

# Hide mouse while typing
mouse_hide_wait 0

# No window shadow (helps with tiling WMs)
macos_show_window_title_in none

# Shell integration (match Ghostty: no-cursor)
shell_integration no-cursor

# =============================================================================
# MISC
# =============================================================================

# Disable audio bell
enable_audio_bell no

# Remote control via socket only (required for PAI tab-setter hooks)
allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}

# =============================================================================
# KEYBINDINGS — Cmd+B prefix mode (coexists with tmux's Ctrl+B)
# =============================================================================

# Clear default shortcuts that conflict
map cmd+t no_op
map cmd+n no_op
map cmd+w no_op

# Shift+Enter passthrough (like Ghostty)
map shift+enter send_text all \x1b\x0d

# Inspector toggle
map cmd+i show_kitty_env_vars

# --- Prefix mode: Cmd+B enters "tmux" mode ---
# Cmd is macOS-only and never reaches the running program, so tmux's
# Ctrl+B prefix passes through untouched when running tmux inside kitty.
map --new-mode tmux --on-unknown end cmd+b

# Escape / Ctrl+C exits prefix mode
map --mode tmux escape pop_keyboard_mode
map --mode tmux ctrl+c pop_keyboard_mode

# ── Core ─────────────────────────────────────────────────────
# Reload config (prefix + r)
map --mode tmux r combine : load_config_file : pop_keyboard_mode

# Close pane (prefix + x)
map --mode tmux x combine : close_window : pop_keyboard_mode

# New tab (prefix + c) — equivalent to tmux new-window
map --mode tmux c combine : new_tab_with_cwd : pop_keyboard_mode

# New OS window (prefix + n) — closest to tmux new-session
map --mode tmux n combine : new_os_window : pop_keyboard_mode

# Detach — no real equivalent, but close the OS window
map --mode tmux shift+d combine : close_os_window : pop_keyboard_mode

# ── Tab navigation (prefix + 1-9) ───────────────────────────
map --mode tmux 1 combine : goto_tab 1 : pop_keyboard_mode
map --mode tmux 2 combine : goto_tab 2 : pop_keyboard_mode
map --mode tmux 3 combine : goto_tab 3 : pop_keyboard_mode
map --mode tmux 4 combine : goto_tab 4 : pop_keyboard_mode
map --mode tmux 5 combine : goto_tab 5 : pop_keyboard_mode
map --mode tmux 6 combine : goto_tab 6 : pop_keyboard_mode
map --mode tmux 7 combine : goto_tab 7 : pop_keyboard_mode
map --mode tmux 8 combine : goto_tab 8 : pop_keyboard_mode
map --mode tmux 9 combine : goto_tab 9 : pop_keyboard_mode

# ── Splits ───────────────────────────────────────────────────
# prefix + | — vertical split (like tmux split -h)
map --mode tmux | combine : launch --location=vsplit --cwd=current : pop_keyboard_mode

# prefix + - — horizontal split (like tmux split -v)
map --mode tmux - combine : launch --location=hsplit --cwd=current : pop_keyboard_mode

# ── Pane navigation (prefix + h/j/k/l) ──────────────────────
map --mode tmux h combine : neighboring_window left : pop_keyboard_mode
map --mode tmux j combine : neighboring_window bottom : pop_keyboard_mode
map --mode tmux k combine : neighboring_window top : pop_keyboard_mode
map --mode tmux l combine : neighboring_window right : pop_keyboard_mode

# ── Pane resize (prefix + H/J/K/L) ──────────────────────────
map --mode tmux shift+j combine : resize_window shorter 3 : pop_keyboard_mode
map --mode tmux shift+k combine : resize_window taller 3 : pop_keyboard_mode
map --mode tmux shift+l combine : resize_window wider 3 : pop_keyboard_mode
map --mode tmux shift+h combine : resize_window narrower 3 : pop_keyboard_mode

# ── Zoom / maximize pane (prefix + m) ───────────────────────
map --mode tmux m combine : toggle_layout stack : pop_keyboard_mode

# ── Equalize layout (prefix + e) ────────────────────────────
map --mode tmux e combine : goto_layout grid : pop_keyboard_mode

# ── Copy mode (prefix + v) — scrollback in pager ────────────
map --mode tmux v combine : show_scrollback : pop_keyboard_mode

# ── Clear pane (prefix + Ctrl+K) ────────────────────────────
map --mode tmux ctrl+k combine : clear_terminal scrollback active : pop_keyboard_mode

# ── Floating overlays ───────────────────────────────────────
# prefix + Ctrl+Y — yazi file manager
map --mode tmux ctrl+y combine : launch --type=overlay --cwd=current yazi : pop_keyboard_mode

# prefix + t — quick floating terminal
map --mode tmux t combine : launch --type=overlay --cwd=current : pop_keyboard_mode

# prefix + Ctrl+G — lazygit
map --mode tmux ctrl+g combine : launch --type=overlay --cwd=current lazygit : pop_keyboard_mode

# prefix + Shift+M — rmpc music player
map --mode tmux shift+m combine : launch --type=overlay rmpc : pop_keyboard_mode

# prefix + w — w3m browser
map --mode tmux w combine : launch --type=overlay w3m https://duckduckgo.com : pop_keyboard_mode

# ── Sessionizer (prefix + f) — fzf project picker ───────────
map --mode tmux f combine : launch --type=overlay --cwd=current kitty-sessionizer : pop_keyboard_mode

# ── Config menu (prefix + d) — fzf config picker ────────────
map --mode tmux d combine : launch --type=overlay kitty-config-menu : pop_keyboard_mode

# ── Layout presets (prefix + Alt+1..5) ───────────────────────
map --mode tmux alt+1 combine : goto_layout splits : pop_keyboard_mode
map --mode tmux alt+2 combine : goto_layout horizontal : pop_keyboard_mode
map --mode tmux alt+3 combine : goto_layout grid : pop_keyboard_mode
map --mode tmux alt+4 combine : goto_layout vertical : pop_keyboard_mode
map --mode tmux alt+5 combine : goto_layout stack : pop_keyboard_mode

# Enable layouts needed for splits and zoom
enabled_layouts splits,grid,stack,horizontal,vertical

# =============================================================================
# SCROLLBACK PAGER (nvim for vim-style copy mode)
# =============================================================================

scrollback_pager nvim -c "set nonumber norelativenumber signcolumn=no showtabline=0 foldcolumn=0 laststatus=0" -c "autocmd TermOpen * normal G" -c "silent! %s/\\e\\[[0-9;]*m//g" -c "map q :qa!<CR>" -

# =============================================================================
# IMAGE SUPPORT
# =============================================================================

placement_strategy top-left
