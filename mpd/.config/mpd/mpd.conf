# MPD Configuration File
# See: https://www.musicpd.org/doc/html/user.html

# Music directory
music_directory    "~/Music"

# Playlist directory
playlist_directory "~/.config/mpd/playlists"

# Database file
db_file            "~/.config/mpd/database"

# State file (saves current playlist state)
state_file         "~/.config/mpd/state"

# Sticker database (for song ratings, play counts, etc.)
sticker_file       "~/.config/mpd/sticker.sql"

# Log file
log_file           "~/.config/mpd/mpd.log"

# PID file
pid_file           "~/.config/mpd/pid"

# Port for MPD to listen on
bind_to_address    "127.0.0.1"
port               "6600"

# Audio output configuration
audio_output {
    type           "osx"
    name           "CoreAudio"
    mixer_type     "software"
}

# Optional: Enable visualizer output for clients that support it
audio_output {
    type           "fifo"
    name           "Visualizer"
    path           "/tmp/mpd.fifo"
    format         "44100:16:2"
}

# Restore paused state on startup
restore_paused     "yes"

# Auto update database when files change
auto_update        "yes"

# Follow symlinks
follow_outside_symlinks  "yes"
follow_inside_symlinks   "yes"
