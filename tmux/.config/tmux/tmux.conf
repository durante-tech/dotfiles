# Enable True color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -gq allow-passthrough on

set -g base-index 1
set -g pane-base-index 1

set-option -g prefix C-b
set-option -g prefix2 none

# Utility bindings
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# Detach session (standard 'd' is used for config menu below)
bind D detach-client  # Capital D to detach

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind v
bind v copy-mode

# resizing panes with hjkl
bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5

# maximize panes
bind -r m resize-pane -Z

# mouse support
set -g mouse on

# vim shell navigations and selects in tmux panes
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

# Enhanced keyboard copy bindings
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle  # Toggle block selection
bind-key -T copy-mode-vi 'Y' send -X copy-end-of-line    # Copy from cursor to end of line

# Instant switch to a new tmux session directory that exist
bind-key -r f run-shell "tmux neww ~/scripts/tmux-sessionizer"
bind-key n command-prompt "new-session -s '%%'"
bind-key C-y display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "yazi" # yazi float
bind-key C-t display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "zsh" # quick floating terminal
bind-key C-g display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "lazygit" # lazygit float
bind-key C-m display-popup -w 95% -h 95% -E "rmpc" # music float
bind-key C-w display-popup -w 90% -h 90% -E "w3m https://duckduckgo.com" # w3m browser float
bind d display-menu -T "#[align=centre]Config" -x C -y C \
    ".zshrc"            z  "display-popup -w 75% -h 75% -E 'nvim ~/.zshrc'" \
    ".zprofile"         p  "display-popup -w 75% -h 75% -E 'nvim ~/.zprofile'" \
    "tmux.conf"         t  "display-popup -w 75% -h 75% -E 'nvim ~/.config/tmux/tmux.conf'" \
    ".nvim"             v  "display-popup -d ~/.config/nvim -E 'nvim ~/.config/nvim'" \
    "quit"              q  ""

# ═══════════════════════════════════════════════════════════════
# Layout Presets (4K Workflows)
# ═══════════════════════════════════════════════════════════════

# Quick layout toggles with Alt (no conflict with hjkl resize)
bind -r M-1 select-layout main-vertical      # Main left, stack right
bind -r M-2 select-layout main-horizontal    # Main top, stack bottom
bind -r M-3 select-layout tiled              # Equal grid (great for 4K)
bind -r M-4 select-layout even-horizontal    # Side by side
bind -r M-5 select-layout even-vertical      # Stacked

# Layout menu (prefix + L)
bind L display-menu -T "#[align=centre]Layouts" -x C -y C \
    "Main + Side"         1  "select-layout main-vertical" \
    "Main + Bottom"       2  "select-layout main-horizontal" \
    "Tiled Grid"          3  "select-layout tiled" \
    "Even Horizontal"     4  "select-layout even-horizontal" \
    "Even Vertical"       5  "select-layout even-vertical" \
    "quit"                q  ""

# ═══════════════════════════════════════════════════════════════
# Enhanced Mouse Copy Support
# ═══════════════════════════════════════════════════════════════

# Mouse drag to copy (without releasing mouse button)
# Automatically copies to system clipboard when selection ends
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"

# Double-click to select word and copy to clipboard
bind-key -n DoubleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-word \; send-keys -X copy-pipe-and-cancel "pbcopy"

# Triple-click to select entire line and copy to clipboard
bind-key -n TripleClick1Pane select-pane \; copy-mode -M \; send-keys -X select-line \; send-keys -X copy-pipe-and-cancel "pbcopy"

# Middle-click or Shift-click to paste from clipboard
bind-key -n MouseDown2Pane run "tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer"

# Right-click to paste (alternative to middle-click)
# Note: Some terminals may not support this, use middle-click as fallback
bind-key -n MouseDown3Pane run "tmux set-buffer \"$(pbpaste)\"; tmux paste-buffer"

# Scroll enters copy mode automatically
bind-key -T root WheelUpPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; copy-mode -e; send-keys -M"
bind-key -T root WheelDownPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t ="

# tmux plugin manager
set-environment -g TMUX_PLUGIN_MANAGER_PATH ~/.config/tmux/.tmux/plugins
set -g @plugin 'tmux-plugins/tpm' # must be the first plugin
set -g @plugin "christoomey/vim-tmux-navigator"

set -g @plugin 'omerxx/tmux-sessionx' # default keybind "<prefix> O" to activate
set -g @plugin "tmux-plugins/tmux-resurrect" #persist tmux sessions after computer restart
set -g @plugin "tmux-plugins/tmux-continuum" #automatically save sessions every 15mins

set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tmux-online-status'
set -g @plugin 'tmux-plugins/tmux-battery'

set -g @sessionx-bind 'o'
set -g @resurrect-capture-pane-contents "on"
set -g @continuum-restore "on"

# Restore additional processes (bun for Claude Code, node, deno, etc.)
set -g @resurrect-processes 'bun node deno "~nvim->nvim"'

# Configure Catppuccin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_status_background "none"
set -g @catppuccin_window_status_style "none"
set -g @catppuccin_pane_status_enabled "off"
set -g @catppuccin_pane_border_status "off"

# Configure Online status
set -g @online_icon "ok"
set -g @offline_icon "nok"

# ═══════════════════════════════════════════════════════════════
# Status Bar (Enhanced for 4K)
# ═══════════════════════════════════════════════════════════════

# status left: session | path | git branch | zoom | window/pane counts
set -g status-left-length 150
set -g status-left ""
set -ga status-left "#{?client_prefix,#{#[bg=#{@thm_red},fg=#{@thm_bg},bold]  #S },#{#[bg=#{@thm_bg},fg=#{@thm_green}]  #S }}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_blue}]  #{=/-32/...:#{s|$USER|~|:#{b:pane_current_path}}} "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_mauve}]  #(cd #{pane_current_path}; git branch --show-current 2>/dev/null || echo '∅') "
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]#{?window_zoomed_flag,│,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_yellow}]#{?window_zoomed_flag,  zoom ,}"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-left "#[bg=#{@thm_bg},fg=#{@thm_teal}] W:#{session_windows} P:#{window_panes} "

# status right: battery | online | date/time
set -g status-right-length 150
set -g status-right ""
set -ga status-right "#{?#{e|>=:10,#{battery_percentage}},#{#[bg=#{@thm_red},fg=#{@thm_bg}]},#{#[bg=#{@thm_bg},fg=#{@thm_green}]}} #{battery_icon} #{battery_percentage} "
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}, none]│"
set -ga status-right "#[bg=#{@thm_bg}]#{?#{==:#{online_status},ok},#[fg=#{@thm_rosewater}] 󰖩 on ,#[fg=#{@thm_red},bold]#[reverse] 󰖪 off }"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_overlay_0},none]│"
set -ga status-right "#[bg=#{@thm_bg},fg=#{@thm_blue}] 󰭦 %m-%d 󰅐 %H:%M "

# Configure Tmux
set -g status-position bottom
set -g status-style "bg=#{@thm_bg}"
set -g status-justify "absolute-centre"

# Longer display times for 4K readability
set -g display-time 3000
set -g display-panes-time 3000

# ═══════════════════════════════════════════════════════════════
# Pane Borders (4K Visual Hierarchy)
# ═══════════════════════════════════════════════════════════════

setw -g pane-border-status top
setw -g pane-border-format " #{pane_index}: #{pane_current_command} "
setw -g pane-active-border-style "fg=#{@thm_blue}"
setw -g pane-border-style "fg=#{@thm_surface_1}"
setw -g pane-border-lines single

# window look and feel
set -wg automatic-rename on
set -g automatic-rename-format "#{pane_current_command}"

set -g window-status-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-last-style "bg=#{@thm_bg},fg=#{@thm_rosewater}"
set -g window-status-activity-style "bg=#{@thm_red},fg=#{@thm_bg}"
set -g window-status-bell-style "bg=#{@thm_red},fg=#{@thm_bg},bold"
set -gF window-status-separator "#[bg=#{@thm_bg},fg=#{@thm_overlay_0}]│"

set -g window-status-current-format " #I#{?#{!=:#{window_name},Window},: #W,} "
set -g window-status-current-style "bg=#{@thm_blue},fg=#{@thm_bg},bold"

run '~/.config/tmux/.tmux/plugins/tpm/tpm' # always keep this line last
