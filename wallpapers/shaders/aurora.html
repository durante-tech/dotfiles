<!DOCTYPE html>
<html>
<!--
  aurora.html — slow aurora borealis curtain in Catppuccin Mocha hues.
  Calm, low-contrast, terminal-friendly. Pairs well with the 75% opacity Ghostty.
-->
<head>
  <meta charset="utf-8">
  <title>aurora</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #11111b; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script id="vs" type="x-shader/x-vertex">
attribute vec2 p; void main() { gl_Position = vec4(p, 0.0, 1.0); }
</script>
<script id="fs" type="x-shader/x-fragment">
precision highp float;
uniform vec2 iResolution;
uniform float iTime;

// Simplex noise — Ashima/Stefan Gustavson, MIT license.
vec3 mod289(vec3 x){return x-floor(x*(1.0/289.0))*289.0;}
vec2 mod289(vec2 x){return x-floor(x*(1.0/289.0))*289.0;}
vec3 permute(vec3 x){return mod289(((x*34.0)+1.0)*x);}
float snoise(vec2 v){
  const vec4 C=vec4(0.211324865405187,0.366025403784439,-0.577350269189626,0.024390243902439);
  vec2 i=floor(v+dot(v,C.yy));
  vec2 x0=v-i+dot(i,C.xx);
  vec2 i1=(x0.x>x0.y)?vec2(1.0,0.0):vec2(0.0,1.0);
  vec4 x12=x0.xyxy+C.xxzz; x12.xy-=i1;
  i=mod289(i);
  vec3 p=permute(permute(i.y+vec3(0.0,i1.y,1.0))+i.x+vec3(0.0,i1.x,1.0));
  vec3 m=max(0.5-vec3(dot(x0,x0),dot(x12.xy,x12.xy),dot(x12.zw,x12.zw)),0.0);
  m=m*m; m=m*m;
  vec3 x=2.0*fract(p*C.www)-1.0;
  vec3 h=abs(x)-0.5;
  vec3 ox=floor(x+0.5);
  vec3 a0=x-ox;
  m*=1.79284291400159-0.85373472095314*(a0*a0+h*h);
  vec3 g; g.x=a0.x*x0.x+h.x*x0.y; g.yz=a0.yz*x12.xz+h.yz*x12.yw;
  return 130.0*dot(m,g);
}

void main() {
  vec2 uv = gl_FragCoord.xy / iResolution.xy;
  vec2 p = uv * 2.0 - 1.0;
  p.x *= iResolution.x / iResolution.y;

  float t = iTime * 0.05;

  // Layered curtains of vertical noise — slow drift for the aurora ribbon.
  float n1 = snoise(vec2(p.x * 1.6 + t, p.y * 0.6 - t * 0.5));
  float n2 = snoise(vec2(p.x * 3.2 - t * 0.7, p.y * 1.1 + t * 0.3));
  float curtain = smoothstep(0.0, 0.7, n1 * 0.6 + n2 * 0.4);

  // Vertical falloff — concentrated in the upper third.
  float vfall = smoothstep(-1.0, 0.4, p.y) * (1.0 - smoothstep(0.4, 1.2, p.y));

  // Catppuccin Mocha palette: teal #94e2d5, mauve #cba6f7, sky #89dceb.
  vec3 teal = vec3(0.58, 0.89, 0.84);
  vec3 mauve = vec3(0.80, 0.65, 0.97);
  vec3 sky = vec3(0.54, 0.86, 0.92);

  float mixA = 0.5 + 0.5 * sin(t * 0.7 + p.x * 0.4);
  vec3 col = mix(teal, mauve, mixA);
  col = mix(col, sky, 0.5 + 0.5 * sin(t * 0.4 + p.y));

  // Star field — sparse, twinkling.
  vec2 grid = floor(uv * vec2(120.0, 80.0));
  float star = step(0.997, fract(sin(dot(grid, vec2(127.1, 311.7))) * 43758.5453));
  star *= 0.5 + 0.5 * sin(iTime * 3.0 + grid.x);

  vec3 base = vec3(0.067, 0.067, 0.106); // Catppuccin Mocha base
  vec3 final = base + col * curtain * vfall * 0.9 + vec3(star * 0.6);

  gl_FragColor = vec4(final, 1.0);
}
</script>
<script>
  const canvas = document.getElementById('c');
  const gl = canvas.getContext('webgl', { antialias: false, alpha: false });
  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);
  resize();
  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
    return s;
  }
  const vs = compile(gl.VERTEX_SHADER, document.getElementById('vs').textContent);
  const fs = compile(gl.FRAGMENT_SHADER, document.getElementById('fs').textContent);
  const prog = gl.createProgram();
  gl.attachShader(prog, vs); gl.attachShader(prog, fs); gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(prog, 'p');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
  const uRes = gl.getUniformLocation(prog, 'iResolution');
  const uTime = gl.getUniformLocation(prog, 'iTime');
  const start = performance.now();
  function frame() {
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, (performance.now() - start) / 1000.0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(frame);
  }
  frame();
</script>
</body>
</html>
