<!DOCTYPE html>
<html>
<!--
  flowfield.html — slow drifting plasma flow field, low-contrast, ambient.
  Catppuccin Mocha palette, ideal under a 75% opacity Ghostty.
-->
<head>
  <meta charset="utf-8">
  <title>flow field</title>
  <style>
    html, body { margin: 0; padding: 0; overflow: hidden; background: #11111b; }
    canvas { display: block; width: 100vw; height: 100vh; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script id="vs" type="x-shader/x-vertex">
attribute vec2 p; void main() { gl_Position = vec4(p, 0.0, 1.0); }
</script>
<script id="fs" type="x-shader/x-fragment">
precision highp float;
uniform vec2 iResolution;
uniform float iTime;

// 2D fbm — Iñigo Quílez idiom.
float hash(vec2 p) { return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453); }
float noise(vec2 p) {
  vec2 i = floor(p), f = fract(p);
  vec2 u = f * f * (3.0 - 2.0 * f);
  return mix(mix(hash(i), hash(i + vec2(1,0)), u.x),
             mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), u.x), u.y);
}
float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 5; i++) {
    v += a * noise(p);
    p *= 2.02;
    a *= 0.5;
  }
  return v;
}

void main() {
  vec2 uv = gl_FragCoord.xy / iResolution.xy;
  vec2 p = uv * 2.0 - 1.0;
  p.x *= iResolution.x / iResolution.y;

  float t = iTime * 0.04;

  // Domain warp — fbm input is itself perturbed by another fbm.
  vec2 q = vec2(fbm(p + t), fbm(p - t + 5.2));
  vec2 r = vec2(fbm(p + q + vec2(1.7, 9.2) + t * 1.5),
                fbm(p + q + vec2(8.3, 2.8) + t * 0.8));
  float f = fbm(p + r);

  // Catppuccin Mocha: base #1e1e2e, blue #89b4fa, lavender #b4befe, pink #f5c2e7.
  vec3 base   = vec3(0.118, 0.118, 0.180);
  vec3 blue   = vec3(0.537, 0.706, 0.980);
  vec3 lav    = vec3(0.706, 0.745, 0.996);
  vec3 pink   = vec3(0.961, 0.761, 0.906);

  vec3 col = mix(base, blue, smoothstep(0.0, 1.0, f));
  col = mix(col, lav, smoothstep(0.4, 1.0, f * f) * length(r));
  col = mix(col, pink, smoothstep(0.7, 1.2, f) * 0.4);

  // Subtle vignette.
  float vig = smoothstep(1.6, 0.5, length(uv - 0.5));
  col *= 0.55 + 0.45 * vig;

  gl_FragColor = vec4(col, 1.0);
}
</script>
<script>
  const canvas = document.getElementById('c');
  const gl = canvas.getContext('webgl', { antialias: false, alpha: false });
  function resize() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;
    gl.viewport(0, 0, canvas.width, canvas.height);
  }
  window.addEventListener('resize', resize);
  resize();
  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src); gl.compileShader(s);
    if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) console.error(gl.getShaderInfoLog(s));
    return s;
  }
  const vs = compile(gl.VERTEX_SHADER, document.getElementById('vs').textContent);
  const fs = compile(gl.FRAGMENT_SHADER, document.getElementById('fs').textContent);
  const prog = gl.createProgram();
  gl.attachShader(prog, vs); gl.attachShader(prog, fs); gl.linkProgram(prog);
  gl.useProgram(prog);
  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(prog, 'p');
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);
  const uRes = gl.getUniformLocation(prog, 'iResolution');
  const uTime = gl.getUniformLocation(prog, 'iTime');
  const start = performance.now();
  function frame() {
    gl.uniform2f(uRes, canvas.width, canvas.height);
    gl.uniform1f(uTime, (performance.now() - start) / 1000.0);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
    requestAnimationFrame(frame);
  }
  frame();
</script>
</body>
</html>
