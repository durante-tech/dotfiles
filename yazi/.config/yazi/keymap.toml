# Yazi keymap configuration
# https://yazi-rs.github.io/docs/configuration/keymap

[[manager.prepend_keymap]]
on = ["<Esc>"]
run = "escape"
desc = "Exit visual mode, clear selected, or cancel search"

[[manager.prepend_keymap]]
on = ["q"]
run = "quit"
desc = "Exit the process"

[[manager.prepend_keymap]]
on = ["Q"]
run = "quit --no-cwd-file"
desc = "Exit without writing cwd-file"

[[manager.prepend_keymap]]
on = ["<C-q>"]
run = "close"
desc = "Close the current tab, or quit if it's the last tab"

# Navigation
[[manager.prepend_keymap]]
on = ["k"]
run = "arrow -1"
desc = "Move cursor up"

[[manager.prepend_keymap]]
on = ["j"]
run = "arrow 1"
desc = "Move cursor down"

[[manager.prepend_keymap]]
on = ["<Up>"]
run = "arrow -1"
desc = "Move cursor up"

[[manager.prepend_keymap]]
on = ["<Down>"]
run = "arrow 1"
desc = "Move cursor down"

[[manager.prepend_keymap]]
on = ["h"]
run = "leave"
desc = "Go back to the parent directory"

[[manager.prepend_keymap]]
on = ["l"]
run = "enter"
desc = "Enter the child directory"

[[manager.prepend_keymap]]
on = ["<Left>"]
run = "leave"
desc = "Go back to the parent directory"

[[manager.prepend_keymap]]
on = ["<Right>"]
run = "enter"
desc = "Enter the child directory"

[[manager.prepend_keymap]]
on = ["<C-u>"]
run = "arrow -50%"
desc = "Move cursor up half page"

[[manager.prepend_keymap]]
on = ["<C-d>"]
run = "arrow 50%"
desc = "Move cursor down half page"

[[manager.prepend_keymap]]
on = ["g", "g"]
run = "arrow -99999999"
desc = "Move cursor to the top"

[[manager.prepend_keymap]]
on = ["G"]
run = "arrow 99999999"
desc = "Move cursor to the bottom"

# Selection
[[manager.prepend_keymap]]
on = ["<Space>"]
run = ["select --state=none", "arrow 1"]
desc = "Toggle selection and move down"

[[manager.prepend_keymap]]
on = ["v"]
run = "visual_mode"
desc = "Enter visual mode (selection mode)"

[[manager.prepend_keymap]]
on = ["V"]
run = "visual_mode --unset"
desc = "Enter visual mode (unset mode)"

[[manager.prepend_keymap]]
on = ["<C-a>"]
run = "select_all --state=true"
desc = "Select all files"

[[manager.prepend_keymap]]
on = ["<C-r>"]
run = "select_all --state=none"
desc = "Inverse selection of all files"

# File operations
[[manager.prepend_keymap]]
on = ["o"]
run = "open"
desc = "Open the selected files"

[[manager.prepend_keymap]]
on = ["O"]
run = "open --interactive"
desc = "Open the selected files interactively"

[[manager.prepend_keymap]]
on = ["<Enter>"]
run = "open"
desc = "Open the selected files"

[[manager.prepend_keymap]]
on = ["y"]
run = "yank"
desc = "Copy the selected files"

[[manager.prepend_keymap]]
on = ["x"]
run = "yank --cut"
desc = "Cut the selected files"

[[manager.prepend_keymap]]
on = ["p"]
run = "paste"
desc = "Paste the files"

[[manager.prepend_keymap]]
on = ["P"]
run = "paste --force"
desc = "Paste the files (overwrite)"

[[manager.prepend_keymap]]
on = ["-"]
run = "link"
desc = "Symlink absolute path"

[[manager.prepend_keymap]]
on = ["_"]
run = "link --relative"
desc = "Symlink relative path"

[[manager.prepend_keymap]]
on = ["d"]
run = "remove"
desc = "Move files to trash"

[[manager.prepend_keymap]]
on = ["D"]
run = "remove --permanently"
desc = "Permanently delete files"

[[manager.prepend_keymap]]
on = ["a"]
run = "create"
desc = "Create a file or directory"

[[manager.prepend_keymap]]
on = ["r"]
run = "rename --cursor=before_ext"
desc = "Rename file"

[[manager.prepend_keymap]]
on = [";"]
run = "shell"
desc = "Run a shell command"

[[manager.prepend_keymap]]
on = [":"]
run = "shell --block"
desc = "Run a shell command (block)"

[[manager.prepend_keymap]]
on = ["."]
run = "hidden toggle"
desc = "Toggle visibility of hidden files"

[[manager.prepend_keymap]]
on = ["s"]
run = "search fd"
desc = "Search files by name using fd"

[[manager.prepend_keymap]]
on = ["S"]
run = "search rg"
desc = "Search files by content using ripgrep"

[[manager.prepend_keymap]]
on = ["<C-s>"]
run = "search none"
desc = "Cancel the ongoing search"

[[manager.prepend_keymap]]
on = ["z"]
run = "plugin zoxide"
desc = "Jump to a directory using zoxide"

[[manager.prepend_keymap]]
on = ["Z"]
run = "plugin fzf"
desc = "Jump to a directory or file using fzf"

# Copy paths
[[manager.prepend_keymap]]
on = ["c", "c"]
run = "copy path"
desc = "Copy absolute path"

[[manager.prepend_keymap]]
on = ["c", "d"]
run = "copy dirname"
desc = "Copy parent directory path"

[[manager.prepend_keymap]]
on = ["c", "f"]
run = "copy filename"
desc = "Copy filename"

[[manager.prepend_keymap]]
on = ["c", "n"]
run = "copy name_without_ext"
desc = "Copy filename without extension"

# Filtering & sorting
[[manager.prepend_keymap]]
on = ["f"]
run = "filter --smart"
desc = "Filter files"

[[manager.prepend_keymap]]
on = [",", "m"]
run = "sort modified --reverse=no"
desc = "Sort by modified time"

[[manager.prepend_keymap]]
on = [",", "M"]
run = "sort modified --reverse"
desc = "Sort by modified time (reverse)"

[[manager.prepend_keymap]]
on = [",", "c"]
run = "sort created --reverse=no"
desc = "Sort by created time"

[[manager.prepend_keymap]]
on = [",", "C"]
run = "sort created --reverse"
desc = "Sort by created time (reverse)"

[[manager.prepend_keymap]]
on = [",", "e"]
run = "sort extension --reverse=no"
desc = "Sort by extension"

[[manager.prepend_keymap]]
on = [",", "E"]
run = "sort extension --reverse"
desc = "Sort by extension (reverse)"

[[manager.prepend_keymap]]
on = [",", "a"]
run = "sort alphabetical --reverse=no"
desc = "Sort alphabetically"

[[manager.prepend_keymap]]
on = [",", "A"]
run = "sort alphabetical --reverse"
desc = "Sort alphabetically (reverse)"

[[manager.prepend_keymap]]
on = [",", "n"]
run = "sort natural --reverse=no"
desc = "Sort naturally"

[[manager.prepend_keymap]]
on = [",", "N"]
run = "sort natural --reverse"
desc = "Sort naturally (reverse)"

[[manager.prepend_keymap]]
on = [",", "s"]
run = "sort size --reverse=no"
desc = "Sort by size"

[[manager.prepend_keymap]]
on = [",", "S"]
run = "sort size --reverse"
desc = "Sort by size (reverse)"

# Goto
[[manager.prepend_keymap]]
on = ["g", "h"]
run = "cd ~"
desc = "Go to home directory"

[[manager.prepend_keymap]]
on = ["g", "c"]
run = "cd ~/.config"
desc = "Go to config directory"

[[manager.prepend_keymap]]
on = ["g", "d"]
run = "cd ~/dotfiles"
desc = "Go to dotfiles"

[[manager.prepend_keymap]]
on = ["g", "D"]
run = "cd ~/Downloads"
desc = "Go to Downloads"

[[manager.prepend_keymap]]
on = ["g", "p"]
run = "cd ~/Projects"
desc = "Go to Projects"

[[manager.prepend_keymap]]
on = ["g", "t"]
run = "cd /tmp"
desc = "Go to tmp"

# Tabs
[[manager.prepend_keymap]]
on = ["t"]
run = "tab_create --current"
desc = "Create new tab"

[[manager.prepend_keymap]]
on = ["1"]
run = "tab_switch 0"
desc = "Switch to tab 1"

[[manager.prepend_keymap]]
on = ["2"]
run = "tab_switch 1"
desc = "Switch to tab 2"

[[manager.prepend_keymap]]
on = ["3"]
run = "tab_switch 2"
desc = "Switch to tab 3"

[[manager.prepend_keymap]]
on = ["["]
run = "tab_switch -1 --relative"
desc = "Switch to previous tab"

[[manager.prepend_keymap]]
on = ["]"]
run = "tab_switch 1 --relative"
desc = "Switch to next tab"

[[manager.prepend_keymap]]
on = ["{"]
run = "tab_swap -1"
desc = "Swap with previous tab"

[[manager.prepend_keymap]]
on = ["}"]
run = "tab_swap 1"
desc = "Swap with next tab"

# Tasks
[[manager.prepend_keymap]]
on = ["w"]
run = "tasks_show"
desc = "Show task manager"

# Help
[[manager.prepend_keymap]]
on = ["~"]
run = "help"
desc = "Open help"

[[manager.prepend_keymap]]
on = ["?"]
run = "help"
desc = "Open help"
