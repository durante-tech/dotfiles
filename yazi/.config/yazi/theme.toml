# Catppuccin Mocha theme for Yazi
# https://github.com/catppuccin/yazi
# Migrated 2026-07-15 to the yazi 26.x theme schema:
# [manager]->[mgr], tab_*->[tabs], mode_*->[mode], separator_*->sep_left/right,
# permissions_*->perm_*, [select]->[pick], help.exec->run, name->url globs.

[mgr]
cwd = { fg = "#89b4fa" }

# Hovered
hovered = { fg = "#1e1e2e", bg = "#89b4fa" }
preview_hovered = { underline = true }

# Find
find_keyword = { fg = "#f9e2af", italic = true }
find_position = { fg = "#f38ba8", bg = "reset", italic = true }

# Marker
marker_selected = { fg = "#a6e3a1", bg = "#a6e3a1" }
marker_copied = { fg = "#f9e2af", bg = "#f9e2af" }
marker_cut = { fg = "#f38ba8", bg = "#f38ba8" }

# Border
border_symbol = "│"
border_style = { fg = "#7f849c" }

# Highlighting
syntect_theme = "~/.config/bat/themes/Catppuccin-mocha.tmTheme"

[tabs]
active = { fg = "#1e1e2e", bg = "#cdd6f4" }
inactive = { fg = "#cdd6f4", bg = "#45475a" }

[mode]
normal_main = { fg = "#1e1e2e", bg = "#89b4fa", bold = true }
select_main = { fg = "#1e1e2e", bg = "#a6e3a1", bold = true }
unset_main = { fg = "#1e1e2e", bg = "#f38ba8", bold = true }

[status]
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }

# Progress
progress_label = { fg = "#cdd6f4", bold = true }
progress_normal = { fg = "#89b4fa", bg = "#45475a" }
progress_error = { fg = "#f38ba8", bg = "#45475a" }

# Permissions
perm_type = { fg = "#89b4fa" }
perm_read = { fg = "#f9e2af" }
perm_write = { fg = "#f38ba8" }
perm_exec = { fg = "#a6e3a1" }
perm_sep = { fg = "#7f849c" }

[input]
border = { fg = "#89b4fa" }
title = {}
value = {}
selected = { reversed = true }

[pick]
border = { fg = "#89b4fa" }
active = { fg = "#f5c2e7" }
inactive = {}

[tasks]
border = { fg = "#89b4fa" }
title = {}
hovered = { underline = true }

[which]
mask = { bg = "#313244" }
cand = { fg = "#94e2d5" }
rest = { fg = "#9399b2" }
desc = { fg = "#f5c2e7" }
separator = "  "
separator_style = { fg = "#585b70" }

[help]
on = { fg = "#f5c2e7" }
run = { fg = "#94e2d5" }
desc = { fg = "#9399b2" }
hovered = { bg = "#585b70", bold = true }
footer = { fg = "#45475a", bg = "#cdd6f4" }

[filetype]
rules = [
  # Images
  { mime = "image/*", fg = "#94e2d5" },
  # Videos
  { mime = "video/*", fg = "#f9e2af" },
  # Audio
  { mime = "audio/*", fg = "#f9e2af" },
  # Archives
  { mime = "application/zip", fg = "#f5c2e7" },
  { mime = "application/gzip", fg = "#f5c2e7" },
  { mime = "application/x-tar", fg = "#f5c2e7" },
  { mime = "application/x-bzip2", fg = "#f5c2e7" },
  { mime = "application/x-7z-compressed", fg = "#f5c2e7" },
  { mime = "application/x-rar", fg = "#f5c2e7" },
  # Documents
  { mime = "application/pdf", fg = "#f38ba8" },
  { mime = "application/doc", fg = "#89b4fa" },
  { mime = "application/msword", fg = "#89b4fa" },
  # Fallback
  { url = "*", fg = "#cdd6f4" },
  { url = "*/", fg = "#89b4fa" },
]
